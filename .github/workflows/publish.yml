name: Publish Extension

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Install runtime dependencies in extension
        # Install esbuild-wasm directly by name instead of running
        # `npm install` against the extension's package.json. npm can't
        # parse the workspace: protocol used by pnpm workspaces, so
        # reading package.json here would error. esbuild-wasm is the only
        # runtime dep that isn't bundled by esbuild at build time, so we
        # install just that one package without writing package.json or
        # creating a lockfile.
        run: cd packages/extension && npm install esbuild-wasm@^0.28.0 --no-save --no-package-lock

      - name: Publish to VS Marketplace
        run: cd packages/extension && npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
