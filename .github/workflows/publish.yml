name: Publish Extension

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Dereference esbuild-wasm symlink for VSIX packaging
        # pnpm's `install` at the repo root already places esbuild-wasm in
        # packages/extension/node_modules/, but as a symlink into the pnpm
        # store. vsce's VSIX packager does not follow symlinks cleanly on
        # all runners, so replace the symlink with a real copy of the
        # package. We can't use `npm install` here — npm trips on the
        # workspace: protocol used by the extension's devDependencies
        # even when filtering devDeps out.
        run: |
          cd packages/extension/node_modules
          if [ -L esbuild-wasm ]; then
            target=$(readlink -f esbuild-wasm)
            rm esbuild-wasm
            cp -r "$target" esbuild-wasm
          fi

      - name: Publish @shapeitup/mcp-server to npm
        # Publishes the standalone server so `npx -y @shapeitup/mcp-server`
        # works for every MCP client without the VS Code extension installed.
        # Uses --no-git-checks because pnpm otherwise refuses to publish from
        # a workspace with uncommitted lockfile tweaks on CI.
        run: pnpm --filter @shapeitup/mcp-server publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish to VS Marketplace
        run: cd packages/extension && npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
