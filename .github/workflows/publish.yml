name: Publish Extension

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (tsc -b)
        run: pnpm lint

      - name: Test @shapeitup/mcp-server
        run: pnpm --filter @shapeitup/mcp-server exec vitest run

      - name: Test @shapeitup/core
        run: pnpm --filter @shapeitup/core exec vitest run

      - name: Test shapeitup-vscode (extension)
        run: pnpm --filter shapeitup-vscode exec vitest run

      - name: Build
        run: pnpm build

      - name: Verify release tag matches package.json version
        # Only runs for GitHub `release` events (workflow_dispatch has no tag).
        # Strips a leading `v` from the tag (e.g. v1.5.0 -> 1.5.0) and compares
        # against packages/mcp-server/package.json .version. Fails loudly on
        # mismatch so we never publish a server labelled with the wrong tag.
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./packages/mcp-server/package.json').version")"
          echo "Git tag (stripped): $TAG"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' (-> '$TAG') does not match packages/mcp-server/package.json version '$PKG_VERSION'." >&2
            exit 1
          fi

      - name: Tarball smoke test
        # Belt and suspenders: even though CI runs this on every PR/push, the
        # final release build could differ (clean install, git state, etc.)
        # so we re-verify the exact tarball we are about to publish.
        shell: bash
        run: |
          set -euo pipefail

          cd packages/mcp-server
          pnpm pack
          TGZ="$(ls shapeitup-mcp-server-*.tgz | head -n1)"
          if [ -z "$TGZ" ]; then
            echo "pnpm pack produced no tarball" >&2
            exit 1
          fi
          TGZ_ABS="$(pwd)/$TGZ"
          cd "$GITHUB_WORKSPACE"

          TMPDIR="$(mktemp -d)"
          echo "Smoke-installing $TGZ_ABS into $TMPDIR"
          pushd "$TMPDIR" >/dev/null

          npm init -y >/dev/null
          npm install "$TGZ_ABS"

          INIT_REQ='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"publish-smoke","version":"0"}}}'
          set +e
          OUT="$(echo "$INIT_REQ" | timeout 10 node node_modules/@shapeitup/mcp-server/dist/index.js 2>&1)"
          RC=$?
          set -e

          echo "--- server output ---"
          echo "$OUT"
          echo "--- end output ---"

          # The server keeps its WebSocket listener open after responding to a
          # single initialize, so `timeout 10` will kill it (rc=124) even on a
          # successful response. Accept that: the only thing that matters for
          # the smoke test is that the server produced a valid initialize
          # response before being killed. Any other non-zero rc with no valid
          # response means a real failure.
          if echo "$OUT" | grep -q '"serverInfo"' && echo "$OUT" | grep -q '"protocolVersion"'; then
            echo "Smoke test OK: serverInfo + protocolVersion found (server rc=$RC; 124=graceful-timeout-kill is expected)."
          else
            echo "Smoke test FAILED: missing serverInfo/protocolVersion in response (rc=$RC)" >&2
            exit 1
          fi

          popd >/dev/null
          rm -rf "$TMPDIR"
          # Leave the tarball in place in case later steps want it; the runner
          # is ephemeral anyway.

      - name: Dereference WASM symlinks for VSIX packaging
        # pnpm's install places runtime deps in packages/extension/node_modules
        # as symlinks into the pnpm store. vsce's VSIX packager does not
        # follow symlinks cleanly on all runners, so replace each symlink
        # with a real copy. Covers esbuild-wasm (runtime .shape.ts bundling)
        # and @resvg/resvg-wasm (headless SVG→PNG for render_preview).
        run: |
          cd packages/extension/node_modules
          for pkg in esbuild-wasm; do
            if [ -L "$pkg" ]; then
              target=$(readlink -f "$pkg")
              rm "$pkg"
              cp -r "$target" "$pkg"
            fi
          done
          # Scoped package: resolve the symlink at @resvg/resvg-wasm.
          if [ -L "@resvg/resvg-wasm" ]; then
            target=$(readlink -f "@resvg/resvg-wasm")
            rm "@resvg/resvg-wasm"
            mkdir -p "@resvg"
            cp -r "$target" "@resvg/resvg-wasm"
          fi

      - name: Publish @shapeitup/mcp-server to npm
        # Publishes the standalone server so `npx -y @shapeitup/mcp-server`
        # works for every MCP client without the VS Code extension installed.
        # Uses --no-git-checks because pnpm otherwise refuses to publish from
        # a workspace with uncommitted lockfile tweaks on CI.
        # NOTE: no `continue-on-error` here — a failed npm publish MUST abort
        # the workflow so the VSIX below never ships referencing a server
        # version that wasn't actually released.
        run: pnpm --filter @shapeitup/mcp-server publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to VS Marketplace
        run: cd packages/extension && npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
